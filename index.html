<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Ragi Sona Ankita ❤️</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Animated Background -->
    <div class="background"></div>

    <!-- Floating Hearts -->
    <div id="hearts"></div>

    <!-- Welcome Page -->
    <section id="welcome">

        <h1>❤️ For My Ragi Sona Ankita ❤️</h1>

        <h3>A Little Surprise Is Waiting For You...</h3>

        <button id="startBtn">
            Open My Heart 💌
        </button>

    </section>

    <!-- Love Letter -->
    <section id="letter" style="display:none;">

        <h1>আমার রাগী সোনা Ankita ❤️</h1>

        <p id="typingText"></p>

        <button id="nextBtn">
            Continue ❤️
        </button>

    </section>

    <!-- Photo Gallery -->
    <section id="gallery" style="display:none;">

        <img id="slideImage" src="images/photo1.jpg" alt="Our Memory">

        <br><br>

        <button id="proposalBtn">
            Continue ❤️
        </button>

    </section>

    <!-- Proposal Page -->
    <section id="proposal" style="display:none;">

        <h1 id="proposalTitle">
            Will You Be My Forever? 💍
        </h1>

        <p id="proposalText">
            তোমাকে আমি অনেক ভালোবাসি ❤️<br><br>
            তুমি কি আমার পথ চলার সঙ্গী হবে?
        </p>

        <div class="choice-buttons">

            <button id="yesBtn">
                YES ❤️
            </button>

            <button id="noBtn">
                NO 😒
            </button>

        </div>

    </section>

    <script src="script.js"></script>

</body>
</html>
